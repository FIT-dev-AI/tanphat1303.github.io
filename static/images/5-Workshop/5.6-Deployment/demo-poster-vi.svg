<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F2027"/>
      <stop offset="50%" stop-color="#203A43"/>
      <stop offset="100%" stop-color="#2C5364"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF9900"/>
      <stop offset="100%" stop-color="#FFAD33"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF9900" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#FF9900" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF9900" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.6"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Decorative grid (subtle) -->
  <g opacity="0.08" stroke="#FFFFFF" stroke-width="1">
    <line x1="0" y1="180" x2="1280" y2="180"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="540" x2="1280" y2="540"/>
    <line x1="320" y1="0" x2="320" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="720"/>
    <line x1="960" y1="0" x2="960" y2="720"/>
  </g>

  <!-- Glow behind play button -->
  <circle cx="640" cy="360" r="260" fill="url(#glow)"/>

  <!-- Top-left: AWS badge -->
  <g transform="translate(60,50)">
    <rect x="0" y="0" width="220" height="56" rx="6" fill="#232F3E"/>
    <text x="110" y="36" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FF9900" text-anchor="middle">aws</text>
    <text x="110" y="50" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">TRINH DIEN CLOUD</text>
  </g>

  <!-- Top-right: Project tag -->
  <g transform="translate(1000,50)">
    <rect x="0" y="0" width="220" height="56" rx="6" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="110" y="26" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">VIDEO LOCALIZATION</text>
    <text x="110" y="46" font-family="Arial, sans-serif" font-size="13" fill="#FF9900" text-anchor="middle">DEMO TRUC TIEP</text>
  </g>

  <!-- Center: Play button -->
  <g filter="url(#shadow)">
    <circle cx="640" cy="320" r="86" fill="url(#accent)"/>
    <polygon points="612,278 612,362 690,320" fill="#0F2027"/>
  </g>

  <!-- Title -->
  <text x="640" y="470" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Demo End-to-End tren AWS</text>

  <!-- Subtitle -->
  <text x="640" y="510" font-family="Arial, sans-serif" font-size="20" fill="#B8C5CC" text-anchor="middle">OCR ’ Amazon Translate ’ TTS ’ Gán phĺ Á</text>

  <!-- Pipeline labels -->
  <g font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">
    <g transform="translate(180,600)">
      <circle cx="0" cy="0" r="22" fill="none" stroke="#FF9900" stroke-width="2"/>
      <text x="0" y="5" fill="#FF9900">1</text>
      <text x="0" y="45" font-weight="bold">Upload</text>
      <text x="0" y="62" font-size="11" fill="#8FA3AD">S3 + ECS</text>
    </g>
    <g transform="translate(370,600)">
      <circle cx="0" cy="0" r="22" fill="none" stroke="#FF9900" stroke-width="2"/>
      <text x="0" y="5" fill="#FF9900">2</text>
      <text x="0" y="45" font-weight="bold">OCR</text>
      <text x="0" y="62" font-size="11" fill="#8FA3AD">EasyOCR + Celery</text>
    </g>
    <g transform="translate(560,600)">
      <circle cx="0" cy="0" r="22" fill="none" stroke="#FF9900" stroke-width="2"/>
      <text x="0" y="5" fill="#FF9900">3</text>
      <text x="0" y="45" font-weight="bold">Dich</text>
      <text x="0" y="62" font-size="11" fill="#8FA3AD">Amazon Translate</text>
    </g>
    <g transform="translate(770,600)">
      <circle cx="0" cy="0" r="22" fill="none" stroke="#FF9900" stroke-width="2"/>
      <text x="0" y="5" fill="#FF9900">4</text>
      <text x="0" y="45" font-weight="bold">TTS</text>
      <text x="0" y="62" font-size="11" fill="#8FA3AD">ElevenLabs</text>
    </g>
    <g transform="translate(970,600)">
      <circle cx="0" cy="0" r="22" fill="none" stroke="#FF9900" stroke-width="2"/>
      <text x="0" y="5" fill="#FF9900">5</text>
      <text x="0" y="45" font-weight="bold">Gan sub</text>
      <text x="0" y="62" font-size="11" fill="#8FA3AD">FFmpeg + S3</text>
    </g>
    <g transform="translate(1110,600)">
      <circle cx="0" cy="0" r="22" fill="#FF9900"/>
      <text x="0" y="5" fill="#0F2027" font-weight="bold"></text>
      <text x="0" y="45" font-weight="bold">Thong bao</text>
      <text x="0" y="62" font-size="11" fill="#8FA3AD">SES Email</text>
    </g>
  </g>

  <!-- Connector arrows between steps -->
  <g stroke="#FF9900" stroke-width="2" fill="#FF9900" opacity="0.6">
    <line x1="205" y1="600" x2="343" y2="600"/>
    <polygon points="343,600 335,596 335,604"/>
    <line x1="395" y1="600" x2="533" y2="600"/>
    <polygon points="533,600 525,596 525,604"/>
    <line x1="585" y1="600" x2="723" y2="600"/>
    <polygon points="723,600 715,596 715,604"/>
    <line x1="795" y1="600" x2="933" y2="600"/>
    <polygon points="933,600 925,596 925,604"/>
    <line x1="995" y1="600" x2="1083" y2="600"/>
    <polygon points="1083,600 1075,596 1075,604"/>
  </g>

  <!-- Bottom: author/region -->
  <text x="60" y="700" font-family="Arial, sans-serif" font-size="12" fill="#8FA3AD">Vo Tan Phat · Thuc tap Cloud Engineer · ap-southeast-2</text>
  <text x="1220" y="700" font-family="Arial, sans-serif" font-size="12" fill="#FF9900" text-anchor="end">¶ drive.google.com/demo</text>
</svg>